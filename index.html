<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Printer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
    }

    #game-container {
      position: relative;
      width: 650px;
      height: 370px;
      user-select: none;
    }

    #game-img {
      width: 650px;
      height: 370px;
      display: block;
      image-rendering: pixelated;
    }

    /* The text input overlay — positioned over the dashes */
    #text-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #char-display {
      position: absolute;
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px;
      color: #111;
      letter-spacing: 18px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Hidden real input to capture keystrokes */
    #hidden-input {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="game-container" tabindex="0">
  <img id="game-img" src="printer01.png" alt="Printer puzzle" />
  <div id="text-overlay">
    <div id="char-display"></div>
  </div>
  <input id="hidden-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
</div>

<script>
  // ─── Page definitions ───────────────────────────────────────────────────────
  // Each page: image src, max chars allowed, position of char display (top/left in px),
  // the answer code (check function), and whether input is active.
  const pages = [
    {
      img: 'printer01.png',
      maxChars: 3,
      pos: { top: 82, left: 20 },
      letterSpacing: 28,
      fontSize: 20,
      // Code: any capitalisation of "ink"
      check: (s) => s.toLowerCase() === 'ink',
      inputActive: true,
    },
    {
      img: 'printer02.png',
      maxChars: 1,
      pos: { top: 82, left: 20 },
      letterSpacing: 28,
      fontSize: 20,
      // Code: '2'
      check: (s) => s === '2',
      inputActive: true,
    },
    {
      img: 'printer03.png',
      maxChars: 5,
      pos: { top: 68, left: 20 },
      letterSpacing: 22,
      fontSize: 20,
      // Code: any capitalisation of "seven", NOT just the digit
      check: (s) => s.toLowerCase() === 'seven',
      inputActive: true,
    },
    {
      img: 'printer04.png',
      maxChars: 6,
      pos: { top: 68, left: 20 },
      letterSpacing: 18,
      fontSize: 20,
      // Code: '158247'
      check: (s) => s === '158247',
      inputActive: true,
    },
    {
      img: 'printer05.png',
      maxChars: 0,
      pos: { top: 0, left: 0 },
      letterSpacing: 0,
      fontSize: 0,
      check: () => false,
      inputActive: false,
    },
  ];

  // ─── State ───────────────────────────────────────────────────────────────────
  let currentPage = 0;
  let typedChars = [];

  // ─── DOM refs ────────────────────────────────────────────────────────────────
  const gameImg      = document.getElementById('game-img');
  const charDisplay  = document.getElementById('char-display');
  const hiddenInput  = document.getElementById('hidden-input');
  const container    = document.getElementById('game-container');

  // ─── Render ──────────────────────────────────────────────────────────────────
  function render() {
    const page = pages[currentPage];

    // Update image
    gameImg.src = page.img;

    // Update char display
    if (page.inputActive) {
      charDisplay.style.top          = page.pos.top + 'px';
      charDisplay.style.left         = page.pos.left + 'px';
      charDisplay.style.fontSize     = page.fontSize + 'px';
      charDisplay.style.letterSpacing = page.letterSpacing + 'px';
      charDisplay.style.display      = 'block';
      charDisplay.textContent        = typedChars.join('');
    } else {
      charDisplay.style.display = 'none';
    }
  }

  // ─── Advance to next page ────────────────────────────────────────────────────
  function advancePage() {
    typedChars = [];
    currentPage++;
    render();
    // Re-focus so keyboard still works
    container.focus();
  }

  // ─── Keydown handler ─────────────────────────────────────────────────────────
  container.addEventListener('keydown', (e) => {
    const page = pages[currentPage];
    if (!page.inputActive) return;

    // Prevent browser shortcuts messing things up for printable keys
    if (e.key.length === 1) e.preventDefault();

    if (e.key === 'Backspace' || e.key === 'Delete') {
      e.preventDefault();
      if (typedChars.length > 0) {
        typedChars.pop();
        render();
      }
      return;
    }

    // Only accept printable single characters
    if (e.key.length !== 1) return;

    // Don't exceed max chars
    if (typedChars.length >= page.maxChars) return;

    typedChars.push(e.key);
    render();

    // Check code after each keystroke (once we have enough chars OR always)
    const currentStr = typedChars.join('');

    // Check immediately on each keystroke
    if (page.check(currentStr)) {
      // Brief flash-blank then advance
      setTimeout(() => {
        advancePage();
      }, 80);
    }
  });

  // ─── Click to focus ──────────────────────────────────────────────────────────
  container.addEventListener('click', () => {
    container.focus();
  });

  // ─── Init ────────────────────────────────────────────────────────────────────
  container.focus();
  render();
</script>

</body>
</html>
