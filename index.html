<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Printer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Courier New', Courier, monospace;
    }

    body {
      margin: 0;
      padding: 0;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      user-select: none;
      outline: none;
    }

    #game-img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* The text input overlay — positioned over the dashes */
    #text-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .char-slot {
      position: absolute;
      font-family: 'Courier New', Courier, monospace;
      color: #111;
      pointer-events: none;
      white-space: pre;
      transform: translateX(-50%);
      line-height: 1;
    }
  </style>
</head>
<body>

<div id="game-container" tabindex="0">
  <img id="game-img" src="printer01.png" alt="Printer puzzle" />
  <div id="text-overlay"></div>
</div>

<script>
  // ─── Native image size ────────────────────────────────────────────────────────
  // All images are 646x431 native pixels
  const NATIVE_W = 646;
  const NATIVE_H = 431;

  // dashXs: X center of each dash (native px), measured via pixel analysis
  // dashY:  Y center of the dash stroke (native px)
  // Text bottom is placed ~18px ABOVE the dash center so it sits clearly above
  const ABOVE = 20; // native px gap between text bottom and dash top

  const pages = [
    {
      img: 'printer01.png',
      dashXs: [67, 156, 254],
      dashY: 95,
      fontSizeNative: 22,
      check: (s) => s.toLowerCase() === 'ink',
      inputActive: true,
    },
    {
      img: 'printer02.png',
      dashXs: [58],
      dashY: 98,
      fontSizeNative: 22,
      check: (s) => s === '2',
      inputActive: true,
    },
    {
      img: 'printer03.png',
      dashXs: [26, 76, 122, 172, 224],
      dashY: 88,
      fontSizeNative: 22,
      check: (s) => s.toLowerCase() === 'seven',
      inputActive: true,
    },
    {
      img: 'printer04.png',
      dashXs: [31, 89, 144, 198, 256, 320],
      dashY: 83,
      fontSizeNative: 22,
      check: (s) => s === '158247',
      inputActive: true,
    },
    {
      img: 'printer05.png',
      dashXs: [],
      dashY: 0,
      fontSizeNative: 0,
      check: () => false,
      inputActive: false,
    },
  ];

  // ─── State ───────────────────────────────────────────────────────────────────
  let currentPage = 0;
  let typedChars  = [];

  // ─── DOM refs ────────────────────────────────────────────────────────────────
  const gameImg   = document.getElementById('game-img');
  const overlay   = document.getElementById('text-overlay');
  const container = document.getElementById('game-container');

  // ─── Render ──────────────────────────────────────────────────────────────────
  function render() {
    const page = pages[currentPage];
    gameImg.src = page.img;
    overlay.innerHTML = '';
    if (!page.inputActive || page.dashXs.length === 0) return;

    const scaleX   = window.innerWidth  / NATIVE_W;
    const scaleY   = window.innerHeight / NATIVE_H;
    const fontSize = page.fontSizeNative * Math.min(scaleX, scaleY);

    typedChars.forEach((ch, i) => {
      if (i >= page.dashXs.length) return;
      const slot = document.createElement('span');
      slot.className = 'char-slot';
      slot.textContent = ch;
      slot.style.fontSize = fontSize + 'px';

      // Centre of dash in screen coordinates
      const cx = page.dashXs[i] * scaleX;

      // Bottom of text sits ABOVE px above the dash Y center
      const dashScreenY = page.dashY * scaleY;
      const topY = dashScreenY - fontSize - (ABOVE * scaleY);

      slot.style.left = cx + 'px';
      slot.style.top  = topY + 'px';
      overlay.appendChild(slot);
    });
  }

  window.addEventListener('resize', render);

  // ─── Advance page ────────────────────────────────────────────────────────────
  function advancePage() {
    typedChars  = [];
    currentPage++;
    render();
    container.focus();
  }

  // ─── Keydown handler ─────────────────────────────────────────────────────────
  container.addEventListener('keydown', (e) => {
    const page = pages[currentPage];
    if (!page.inputActive) return;

    if (e.key.length === 1) e.preventDefault();

    if (e.key === 'Backspace' || e.key === 'Delete') {
      e.preventDefault();
      if (typedChars.length > 0) { typedChars.pop(); render(); }
      return;
    }

    if (e.key.length !== 1) return;
    if (typedChars.length >= page.dashXs.length) return;

    typedChars.push(e.key);
    render();

    if (page.check(typedChars.join(''))) {
      setTimeout(advancePage, 80);
    }
  });

  container.addEventListener('click', () => container.focus());

  container.focus();
  render();
</script>

</body>
</html>
